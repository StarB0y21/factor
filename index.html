<!DOCTYPE html>
<html dir="rtl" lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاکتور (demo)</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="product-detial-selection">
    </div>
    <div id="main">
    </div>
    <div id="factor-type">
        <input type="radio" name="factor-type-btn" id="enter" value="enter">
        <label for="enter">قبض ورود</label>
        <input type="radio" name="factor-type-btn" id="exit" value="exit" onchange="exitFactor()">
        <label for="exit">قبض خروج</label>
        <br>
        <label for="paper">اندازه برگه را انتخاب کنید:</label>
        <select name="paper" id="paper">
            <option value="A5">A5</option>
            <option value="B5">B5</option>
            <option value="C5">C5</option>
        </select>
        <br>
        <button onclick="editFactor()">ویرایش</button>
        <button onclick="closeEdit()">خروج</button>
        <button onclick="saveEdit()">ذخیره</button>
        <button onclick="print()">چاپ</button>
    </div>
</body>

</html>
